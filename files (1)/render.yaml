services:
  - type: web
    name: ai-task-planner
    runtime: python
    buildCommand: pip install -r requirements.txt && python database.py
    startCommand: gunicorn app:app --workers 1 --threads 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_TOKEN
        sync: false        # you fill this in Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false        # you fill this in Render dashboard
    disk:
      name: planner-data
      mountPath: /data
      sizeGB: 1
