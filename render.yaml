services:
  - type: web
    name: ai-task-planner
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/taskplanner.db
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: taskmind-db
      mountPath: /var/data
      sizeGB: 1
